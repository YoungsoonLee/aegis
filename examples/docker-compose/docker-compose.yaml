services:
  aegis:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - ./aegis.yaml:/app/configs/aegis.yaml:ro
    environment:
      - AEGIS_CONFIG=configs/aegis.yaml
    depends_on:
      mock-llm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  demo-agent:
    build: ./demo-agent
    ports:
      - "3000:3000"
    environment:
      - OPENAI_API_BASE=http://aegis:8080/v1
      - OPENAI_API_KEY=mock-key
    depends_on:
      aegis:
        condition: service_healthy

  mock-llm:
    build: ./mock-llm
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health')"]
      interval: 3s
      timeout: 2s
      retries: 5
